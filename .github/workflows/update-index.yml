name: Auto Fetch Market Indices

on:
  schedule:
    # 星期一到五，每小時執行一次 (UTC 時間)
    - cron: '0 * * * 1-5'
    #- cron: '*/5 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      run: python fetch_indices.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "Auto-update market indices [skip ci]"
        git push
